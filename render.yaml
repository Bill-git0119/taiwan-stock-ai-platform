services:
  - type: web
    name: taiwan-stock-ai-api
    env: python
    plan: free

    rootDir: backend

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      alembic upgrade head

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /api/v1/health

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./app.db
      - key: JWT_SECRET
        value: change_me_now_123
      - key: SCHEDULER_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        value: https://taiwan-stock-ai-platform.vercel.app,http://localhost:3000
      # Admin bootstrap — every startup, this email gets elite + is_admin.
      # If user doesn't exist (ephemeral SQLite wiped), it's auto-created
      # using BOOTSTRAP_ADMIN_PASSWORD so you can log in immediately.
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: zhangbaixun93@gmail.com
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
