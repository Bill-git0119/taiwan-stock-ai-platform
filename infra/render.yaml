services:
  - type: web
    name: taiwan-stock-ai-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: taiwan-stock-ai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ELITE
        sync: false
      - key: LINE_CHANNEL_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: SCHEDULER_TIMEZONE
        value: Asia/Taipei
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: taiwan-stock-ai-db
    plan: starter
    databaseName: taiwan_stock_ai
    postgresMajorVersion: 16
